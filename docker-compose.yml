services:
  canaan-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      # Set these for first-run initialization.
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SESSION_SECRET=${SESSION_SECRET:-dev-change-me}
      - DB_PATH=/data/canaan_scanner.sqlite

      # Scan tuning (optional)
      - SCAN_CONCURRENCY=${SCAN_CONCURRENCY:-20}
      - CONNECT_TIMEOUT_S=${CONNECT_TIMEOUT_S:-2.0}
      - READ_TIMEOUT_S=${READ_TIMEOUT_S:-5.0}
      - MINER_PORT=${MINER_PORT:-4028}
      - MAX_IPS_PER_SCAN=${MAX_IPS_PER_SCAN:-5000}
      - DEBUG_EXPORT_MAX_BYTES=${DEBUG_EXPORT_MAX_BYTES:-52428800}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/login', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
