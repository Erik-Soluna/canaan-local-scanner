<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Canaan A15 Scanner</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        min-height: 100vh;
        background: #f0f2f5;
        color: #222;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .page-shell {
        width: 100%;
        max-width: 420px;
      }
      .card {
        padding: 20px 22px;
        border: 1px solid #dde1e6;
        border-radius: 10px;
        background: #fff;
        box-shadow: 0 1px 3px rgba(0,0,0,.06);
      }
      label { display: flex; flex-direction: column; gap: 6px; font-size: 0.9rem; margin-top: 12px; }
      label:first-of-type { margin-top: 0; }
      input { padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; width: 100%; }
      .error { color: #b00020; margin-top: 8px; }
      .muted { color: #666; font-size: 0.85rem; margin-top: 14px; line-height: 1.4; }
      h2 { margin: 0 0 16px; font-size: 1.35rem; }
      button { margin-top: 16px; padding: 10px 16px; cursor: pointer; border-radius: 6px; border: 1px solid #333; background: #222; color: #fff; }
      button:hover { background: #444; }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="card">
        <h2>Login</h2>
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/login">
          <label>
            Username
            <input name="username" type="text" value="{{ username_prefill or '' }}" autocomplete="username" />
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="current-password" />
          </label>
          <button type="submit">Sign in</button>
        </form>
        <div class="muted">
          If you haven't set env <code>ADMIN_USERNAME</code> / <code>ADMIN_PASSWORD</code>, initial defaults are <code>admin</code> / <code>admin</code>.
        </div>
      </div>
    </div>
  </body>
</html>
